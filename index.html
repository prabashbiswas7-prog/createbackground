<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Create BG</title>
<link rel="stylesheet" href="css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Boot screen -->
<div id="loading">
  <div class="boot-logo">Create BG</div>
  <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>
  <div class="boot-text">INITIALIZING...</div>
</div>

<div id="layout">

  <!-- Left Sidebar -->
  <aside id="left-sidebar">
    <div class="brand">
      <div class="logo">Create BG</div>
      <div class="version">V2.0.4-STABLE</div>
    </div>

    <div class="search-box">
      <svg class="icon search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" placeholder="SEARCH TOOLS...">
    </div>

    <nav class="main-nav" id="tool-nav">
      <!-- Tools will be injected here -->
    </nav>
  </aside>

  <!-- Center Area -->
  <main class="center-area">
    <div class="canvas-container" id="canvas-wrap">
      <canvas id="main-canvas" width="1200" height="1200"></canvas>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="status-left">
        <div class="status-title" id="tool-name">PERFORMANCE_V2</div>
        <div class="status-ref" id="status-text">SYS_REF: 082</div>
      </div>

      <div class="actions-center">
        <button class="btn-ghost" id="btn-random">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          RANDOMIZE
        </button>
        <button class="btn-ghost" id="btn-reset">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          RESET
        </button>
      </div>

      <div class="actions-right">
        <button class="btn-ghost" id="btn-css">Copy CSS</button>
        <button class="btn-primary" id="btn-export">Export</button>
      </div>
    </div>
  </main>

  <!-- Right Sidebar -->
  <aside id="right-sidebar">
    <div class="sidebar-header">
      <div class="title">CONTROLS</div>
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    </div>

    <div class="controls-content" id="sidebar-content">
      <!-- Controls will be injected here -->
    </div>
  </aside>

</div>

<div id="toasts"></div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/tools.js"></script>
<script src="js/app.js"></script>


<!-- Download Modal -->
<div id="download-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content" style="max-width: 500px; text-align: center;">
    <h3>Export Options</h3>
    <div style="margin: 20px 0; display: flex; gap: 20px; justify-content: center;">
        <div>
            <label>Format:</label>
            <select id="export-format" style="width: auto; display: inline-block; margin-left: 10px;">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
                <option value="webp">WebP</option>
                <option value="svg">SVG</option>
            </select>
        </div>
        <div>
            <label>Quality:</label>
            <select id="export-quality" style="width: auto; display: inline-block; margin-left: 10px;">
                <option value="1">1x (Standard)</option>
                <option value="2">2x (High)</option>
                <option value="3">3x (Ultra)</option>
                <option value="5">5x (Max)</option>
            </select>
        </div>
    </div>
    <div class="ad-slot" style="width: 100%; height: 250px; background: #222; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #888;">
        Ad Space (Placeholder)
    </div>
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button class="btn-ghost" onclick="document.getElementById('download-modal').style.display='none'">Cancel</button>
        <button class="btn-primary" id="confirm-download-btn">Download</button>
    </div>
  </div>
</div>

<!-- Full Screen Ad Modal -->
<div id="full-ad-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content" style="width: 50%; max-width: 800px; text-align: center;">
    <h3>Advertisement</h3>
    <div class="full-ad-slot" style="width: 100%; height: 400px; background: #222; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #888;">
        Full Screen Ad Space
    </div>
    <button class="btn-primary" onclick="document.getElementById('full-ad-modal').style.display='none'; document.getElementById('download-modal').style.display='flex';">Skip to Download</button>
  </div>
</div>

</body>
</html>
