<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenStudio — Generative Design Tools</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div style="font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--text)">Gen<span style="color:var(--accent2)">Studio</span></div>
  <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
  <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">Loading tools…</div>
</div>

<!-- Main layout -->
<div id="layout">

  <!-- Tool nav icons -->
  <nav id="tool-nav"></nav>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2 id="tool-title" style="margin:0; font-size: 16px; font-weight: normal; color: var(--text);">Blocks</h2>
    </div>
    <!-- Controls injected here -->
    <div id="sidebar-controls"></div>
    <div class="sidebar-actions">
      <button class="btn btn-ghost" id="btn-randomize" title="Randomize (Ctrl+R)">Randomize <kbd>R</kbd></button>
      <button class="btn btn-ghost" id="btn-reset">Reset <kbd>⌫</kbd></button>
      <button class="btn btn-primary" id="btn-png">Export PNG <kbd>⌘S</kbd></button>
      <button class="btn btn-ghost" id="btn-svg">Export SVG</button>
      <button class="btn btn-ghost" id="btn-jpg" style="display:none;">Export JPG</button>
    </div>
  </aside>

  <!-- Canvas area -->
  <main id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="main-canvas" width="800" height="800"></canvas>
    </div>
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/tools.js"></script>
<script src="js/app.js"></script>
</body>
</html>
