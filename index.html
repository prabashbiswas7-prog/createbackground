<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenStudio — Generative Design Tools</title>
<meta name="description" content="20 powerful generative art tools in your browser. Create noise, gradients, flow fields, fractals, ASCII art, marble, topo maps and more. Free, no install.">
<meta property="og:title" content="GenStudio — Generative Design Tools">
<meta property="og:description" content="20 browser-based generative art tools. Free & instant.">
<meta property="og:type" content="website">
<link rel="stylesheet" href="css/main.css">
<!-- Google AdSense — replace ca-pub-XXXXXXXX with your publisher ID -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div style="font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--text)">Gen<span style="color:var(--accent2)">Studio</span></div>
  <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
  <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">Loading tools…</div>
</div>

<!-- Header -->
<header id="header">
  <div class="logo">Gen<span>Studio</span></div>
  <span class="tool-title" id="tool-title">Blocks</span>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="btn-randomize" title="Randomize (Ctrl+R)">🎲 Randomize</button>
    <button class="btn btn-ghost btn-sm" id="btn-jpg">JPG</button>
    <button class="btn btn-ghost btn-sm" id="btn-png">PNG</button>
    <button class="btn btn-primary btn-sm" id="btn-svg">SVG</button>
  </div>
</header>

<!-- Main layout -->
<div id="layout">

  <!-- Tool nav icons -->
  <nav id="tool-nav"></nav>

  <!-- Sidebar -->
  <aside id="sidebar">
    <!-- Ad banner top of sidebar -->
    <div class="ad-banner" id="ad-sidebar">
      <!-- AdSense sidebar unit — replace with your ad slot -->
      <ins class="adsbygoogle"
        style="display:block;width:256px;height:90px"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
        data-ad-slot="XXXXXXXXXX"
        data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <!-- Controls injected here -->
    <div id="sidebar-controls"></div>
  </aside>

  <!-- Canvas area -->
  <main id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="main-canvas" width="800" height="800"></canvas>
    </div>
    <!-- Bottom bar with ad -->
    <div id="bottom-bar">
      <span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap">
        <span class="status-dot"></span> &nbsp;Ready &nbsp;·&nbsp; <kbd>Ctrl+S</kbd> export &nbsp;·&nbsp; <kbd>Ctrl+R</kbd> randomize
      </span>
      <!-- Leaderboard Ad -->
      <div class="ad-banner" id="ad-bottom">
        <ins class="adsbygoogle"
          style="display:block;width:100%;height:30px"
          data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
          data-ad-slot="XXXXXXXXXX"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/tools.js"></script>
<script src="js/app.js"></script>
</body>
</html>
